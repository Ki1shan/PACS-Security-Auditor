version: "3.8"

# ============================================================
# PACS Security Auditor — Lab Environment
# Target: DCM4CHEE (intentionally insecure for training)
# Attacker: Kali-style API container
# ============================================================
# USAGE:
#   docker compose up -d           # Start lab
#   docker compose logs -f         # Watch logs
#   docker compose down            # Stop
#
# AUTHORIZED TESTING ONLY — do not expose to public internet
# ============================================================

services:

  # ─────────────────────────────────────────
  # PostgreSQL — PACS database
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pacs-db
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs_secret_123
    volumes:
      - pacs_db_data:/var/lib/postgresql/data
    networks:
      - pacs-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pacs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Keycloak — Identity Provider (disabled by default)
  # Uncomment to test OIDC-secured DCM4CHEE
  # ─────────────────────────────────────────
  # keycloak:
  #   image: quay.io/keycloak/keycloak:22.0
  #   container_name: pacs-keycloak
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: admin
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - pacs-network

  # ─────────────────────────────────────────
  # DCM4CHEE Archive — Target PACS
  # Default config = intentionally vulnerable
  # ─────────────────────────────────────────
  dcm4chee:
    image: dcm4che/dcm4chee-arc-psql:5.32.0
    container_name: pacs-target
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs_secret_123
      POSTGRES_HOST: db
      # Insecure defaults for training — DO NOT use in production
      AUTH_SERVER_URL: none
      HTTP_PORT: 8080
      HTTPS_PORT: 8443
      DICOM_HOST: dcm4chee
    ports:
      - "104:11112"       # DICOM plaintext (vulnerable — no TLS)
      - "2762:2762"       # DICOM TLS
      - "8080:8080"       # DCM4CHEE web UI
      - "8443:8443"       # DCM4CHEE HTTPS
    volumes:
      - dcm4chee_data:/storage
    networks:
      pacs-network:
        aliases:
          - pacs.lab.local
    labels:
      - "security.training=true"
      - "security.intentionally-insecure=true"

  # ─────────────────────────────────────────
  # Orthanc — Secondary PACS target
  # Lightweight DICOM server for comparison
  # ─────────────────────────────────────────
  orthanc:
    image: jodogne/orthanc:latest
    container_name: pacs-orthanc
    ports:
      - "4242:4242"       # DICOM port
      - "8042:8042"       # Orthanc REST API
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_data:/var/lib/orthanc/db
    networks:
      - pacs-network
    labels:
      - "security.training=true"

  # ─────────────────────────────────────────
  # Security Auditor API
  # Our tool — scans the DCM4CHEE target above
  # ─────────────────────────────────────────
  auditor-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pacs-auditor-api
    ports:
      - "8000:8000"
    environment:
      DEFAULT_TARGET: dcm4chee
      DEFAULT_PORT: 11112
      ENV: development
    depends_on:
      - dcm4chee
    networks:
      - pacs-network
    volumes:
      - ../reports:/app/reports

  # ─────────────────────────────────────────
  # Wireshark (tcpdump capture)
  # Captures DICOM traffic to prove it's plaintext
  # ─────────────────────────────────────────
  traffic-capture:
    image: nicolaka/netshoot:latest
    container_name: pacs-capture
    network_mode: "service:dcm4chee"
    command: >
      sh -c "tcpdump -i any -w /captures/dicom_traffic.pcap port 11112 &
             echo 'Capture started. PCAP saved to /captures/dicom_traffic.pcap'"
    volumes:
      - ./captures:/captures
    profiles:
      - capture  # Only start with: docker compose --profile capture up

networks:
  pacs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  pacs_db_data:
  dcm4chee_data:
  orthanc_data:
